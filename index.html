<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> My Profile</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:420px;
    background:white;
    border-radius:15px;
    box-shadow:0 15px 30px rgba(0,0,0,0.3);
    overflow:hidden;
    transition:.4s;
}

.card:hover{
    transform:scale(1.03);
}

.header{
    background:#4CAF50;
    color:white;
    padding:25px;
    text-align:center;
}

.header h1{
    margin-top:10px;
}

.icon{
    font-size:60px;
}

.info{
    padding:25px;
}

.info p{
    font-size:18px;
    margin:15px 0;
    border-bottom:1px solid #ddd;
    padding-bottom:10px;
}

.info strong{
    color:#0072ff;
}

button{
    width:90%;
    margin:20px;
    padding:15px;
    border:none;
    border-radius:8px;
    background:#0072ff;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#0055cc;
    transform:translateY(-3px);
}

.footer{
    text-align:center;
    padding:15px;
    background:#f5f5f5;
    color:#666;
    font-size:15px;
}
</style>

</head>
<body>

<div class="card">

<div class="header">
<div class="icon">🎓</div>
<h1>Student Profile</h1>
</div>

<div class="info">

<p><strong>👤 Name:</strong> Akshay Kumar</p>

<p><strong>🏫 College:</strong> Jagan Institute of Management Studies (JIMS)</p>

<p><strong>📚 Branch:</strong> Master of Computer Applications (MCA)</p>

<p><strong>📧 Email:</strong> kumar07.akshay2@gmail.com</p>

<p><strong>📅 Current Date & Time:</strong> <span id="datetime"></span></p>

</div>

<center>
<button onclick="welcome()">Click Here 👋</button>
</center>

<div class="footer">
Made with ❤️ using HTML, CSS & JavaScript
</div>

</div>

<script>

function updateTime(){
    let now=new Date();
    document.getElementById("datetime").innerHTML=
    now.toLocaleDateString()+" | "+now.toLocaleTimeString();
}

setInterval(updateTime,1000);
updateTime();

function welcome(){
    alert("🎉 Welcome Akshay Kumar!\n\nYour HTML page is working successfully.");
}

</script>

</body>
</html>
